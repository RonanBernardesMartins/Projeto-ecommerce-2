<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vortex Hardware | Loja Oficial</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&family=Inter:wght@300;400;500;600;700;800;950&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .font-code { font-family: 'Fira Code', monospace; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .smooth-scroll { scroll-behavior: smooth; }
        .premium-gradient { background: linear-gradient(135deg, #020617 0%, #0f172a 50%, #1e1b4b 100%); }
        .horizontal-carousel { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; gap: 1rem; padding-bottom: 0.75rem; }
        .horizontal-carousel > div { scroll-snap-align: start; flex: 0 0 auto; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col smooth-scroll">

    <div id="client-app" class="flex-grow flex flex-col min-h-screen">
        </div>

    <div id="client-cart-slide" class="fixed inset-y-0 right-0 w-full max-w-sm bg-white shadow-2xl border-l border-slate-200 transform translate-x-full transition-transform duration-300 z-50 flex flex-col hidden text-slate-800">
        <div class="p-4 border-b border-slate-100 flex items-center justify-between bg-slate-50">
            <h3 class="font-bold text-sm text-slate-900 flex items-center gap-1.5"><i data-lucide="shopping-cart" class="w-4 h-4 text-orange-500"></i> Seu Carrinho</h3>
            <button onclick="toggleCartSlide(false)" class="p-1 hover:bg-slate-200 rounded text-slate-400 hover:text-slate-700"><i data-lucide="x" class="w-4 h-4"></i></button>
        </div>
        <div id="cart-items-wrapper" class="flex-grow overflow-y-auto p-4 space-y-3"></div>
        <div class="p-4 border-t border-slate-100 bg-slate-50 space-y-3">
            <div class="flex justify-between text-xs font-bold"><span>Subtotal:</span><span id="cart-total-value" class="text-orange-600 text-sm">R$ 0,00</span></div>
            <button onclick="navigateTo('checkout')" class="w-full bg-slate-900 hover:bg-slate-800 text-white font-bold py-2.5 rounded text-xs flex items-center justify-center gap-1.5 shadow-md">
                <i data-lucide="arrow-right" class="w-3.5 h-3.5"></i> Avançar para o Checkout
            </button>
        </div>
    </div>

    <script>
        // Dados de Fallback caso o LocalStorage esteja completamente vazio
        const BASE_PRODUCTS = [
            { id: "vtx_prod_1", name: "Placa de Vídeo PCyes NVIDIA RTX 2060 Graffiti Series, 6GB, GDDR6, Preto - PA2060RTX6GDF", category: "Placas de Vídeo", price: 1499.99, oldPrice: 1941.16, stock: 5, description: "A GeForce RTX 2060 é alimentada pela arquitetura NVIDIA Turing, trazendo desempenho incrível e o poder do Ray Tracing em tempo real.", specifications: "Arquitetura: NVIDIA Turing com Ray Tracing | Compatibilidade: Slots PCIe | Performance: Ideal para VR | Refrigeração: Dual Fan Graffiti", image: "https://images.unsplash.com/photo-1591488320449-011701bb6704?w=500", flashDeal: true },
            { id: "vtx_prod_2", name: "Placa-Mãe Gigabyte Z890M AORUS ELITE WIFI7 ICE, Intel, LGA1851, DDR5", category: "Placas-Mãe", price: 3555.99, oldPrice: 4444.43, stock: 17, description: "Placa-mãe gamer de alto rendimento na cor branca, com dissipadores massivos e conexão Wi-Fi 7 nativa.", specifications: "Soquete: Intel LGA1851 | Memória: DDR5 XMP | Rede: Wi-Fi 7 Integrado | Formato: Micro-ATX Premium", image: "https://images.unsplash.com/photo-1518770660439-4636190af475?w=500", flashDeal: true }
        ];

        const BASE_CATEGORIES = ["Placas de Vídeo", "Placas-Mãe", "Processadores", "Periféricos", "Monitores"];

        // State Machine da SPA
        let currentView = "home";
        let selectedProductId = null;
        let selectedAccountTab = "info";
        let clientSearch = "";
        let clientCategory = "all";
        let activeCoupon = null;
        let simulateCepResult = null;

        // Inicia a base apenas se o usuário nunca tiver aberto o admin antes no PC
        function verifyDatabase() {
            if (!localStorage.getItem("db_prod")) localStorage.setItem("db_prod", JSON.stringify(BASE_PRODUCTS));
            if (!localStorage.getItem("db_cats")) localStorage.setItem("db_cats", JSON.stringify(BASE_CATEGORIES));
            if (!localStorage.getItem("db_brand")) localStorage.setItem("db_brand", JSON.stringify({ storeName: "VORTEX HARDWARE", primaryColor: "#ea580c", bannerTitle: "MEGA MAIO VORTEX" }));
            if (!localStorage.getItem("db_finance")) localStorage.setItem("db_finance", JSON.stringify({ pixDiscount: 15, cardOneDiscount: 10, hasInterest: false }));
            if (!localStorage.getItem("db_cart")) localStorage.setItem("db_cart", JSON.stringify([]));
            if (!localStorage.getItem("db_orders")) localStorage.setItem("db_orders", JSON.stringify([]));
            if (!localStorage.getItem("db_account")) localStorage.setItem("db_account", JSON.stringify({ name: "Alex Silva Santos", email: "alex.santos@devflorianopolis.com.br", phone: "(48) 99123-4567", securityLog: "Sessão Cliente Criptografada", paymentMethod: "Cartão final **** 4412" }));
        }

        function navigateTo(view, id = null) {
            currentView = view;
            if (id) selectedProductId = id;
            simulateCepResult = null;
            window.scrollTo({ top: 0, behavior: 'smooth' });
            toggleCartSlide(false);
            renderClientView();
        }

        function handleSearch(val) {
            clientSearch = val.toLowerCase();
            currentView = "home";
            renderClientView();
        }

        function changeCategory(cat) {
            clientCategory = cat;
            currentView = "home";
            renderClientView();
        }

        // --- SPA RENDERING ENGINE (APENAS CONSUMIDOR) ---
        function renderClientView() {
            const clientApp = document.getElementById("client-app");
            const brand = JSON.parse(localStorage.getItem("db_brand"));
            const products = JSON.parse(localStorage.getItem("db_prod"));
            const categories = JSON.parse(localStorage.getItem("db_cats") || "[]");
            const finance = JSON.parse(localStorage.getItem("db_finance"));
            const cart = JSON.parse(localStorage.getItem("db_cart") || "[]");
            const cartCount = cart.reduce((acc, c) => acc + c.qty, 0);

            let html = `
                <nav class="bg-[#002f5c] border-b border-blue-950 px-6 py-4 flex items-center justify-between sticky top-0 z-30 shadow-md text-white">
                    <div onclick="navigateTo('home'); changeCategory('all');" class="flex items-center gap-2.5 cursor-pointer">
                        <div class="px-3 py-1 bg-orange-600 rounded text-white font-black text-xl italic tracking-tighter shadow-md">VORTEX</div>
                    </div>
                    
                    <div class="hidden md:flex items-center bg-white rounded-lg px-3 py-1.5 w-full max-w-md mx-4">
                        <input id="search-input-main" oninput="handleSearch(this.value)" type="text" placeholder="Busque seu hardware aqui..." value="${clientSearch}" class="bg-transparent text-slate-800 text-xs focus:outline-none w-full">
                        <i data-lucide="search" class="w-4 h-4 text-slate-400"></i>
                    </div>

                    <div class="flex items-center gap-6 text-xs font-bold text-slate-200">
                        <button onclick="navigateTo('home'); changeCategory('all');" class="hover:text-orange-400 transition-all">Departamentos</button>
                        <button onclick="navigateTo('account')" class="hover:text-orange-400 transition-all flex items-center gap-1.5"><i data-lucide="user" class="w-3.5 h-3.5"></i> Minha Conta</button>
                    </div>

                    <button onclick="toggleCartSlide(true)" class="ml-4 px-4 py-2 bg-[#001f3f] border border-blue-800 text-slate-200 hover:text-white rounded font-bold text-xs flex items-center gap-2 transition-all shadow-inner">
                        <i data-lucide="shopping-cart" class="w-4 h-4 text-orange-500"></i> Carrinho
                        <span class="bg-orange-600 text-white text-[10px] font-bold px-1.5 py-0.5 rounded-full">${cartCount}</span>
                    </button>
                </nav>

                <div class="flex-grow flex flex-col justify-between w-full">
            `;

            // --- VIEW: HOME ---
            if (currentView === "home") {
                const filteredProducts = products.filter(p => {
                    const matchesSearch = p.name.toLowerCase().includes(clientSearch) || p.description.toLowerCase().includes(clientSearch);
                    const matchesCat = clientCategory === "all" || p.category === clientCategory;
                    return matchesSearch && matchesCat;
                });

                const carouselProducts = products.filter(p => p.flashDeal);

                html += `
                    <div class="premium-gradient text-white py-12 px-6 shadow-inner shrink-0 relative">
                        <div class="max-w-6xl mx-auto flex flex-col md:flex-row items-center justify-between gap-6 relative z-10">
                            <div class="space-y-2 max-w-xl">
                                <span class="inline-flex items-center gap-1.5 px-3 py-0.5 rounded-full text-[10px] font-extrabold bg-orange-500/10 text-orange-400 border border-orange-500/20 uppercase tracking-widest">Semana Gamer Enthusiast</span>
                                <h2 class="text-2xl sm:text-3xl font-black tracking-tight leading-none">${brand.bannerTitle}</h2>
                                <p class="text-xs text-slate-400 font-medium">Os melhores componentes e periféricos do mercado com descontos reais à vista no PIX ou parcelamento facilitado no cartão.</p>
                            </div>
                            <div class="bg-slate-900/80 border border-slate-800 p-4 rounded-xl text-center space-y-1 backdrop-blur-sm shadow-xl">
                                <span class="text-[9px] uppercase tracking-widest text-orange-400 font-bold">Cupom Ativo</span>
                                <div class="text-base font-black font-code text-white bg-slate-950 px-4 py-1 rounded border border-slate-800">DESCONTO10</div>
                            </div>
                        </div>
                    </div>

                    <div class="bg-white border-b border-slate-200 py-3.5 px-6 shadow-sm">
                        <div class="max-w-6xl mx-auto flex flex-wrap items-center justify-between gap-4 text-[11px] font-bold text-slate-600">
                            <div class="flex items-center gap-2"><i data-lucide="truck" class="text-orange-500 w-4 h-4"></i> <span>FRETE GRÁTIS em compras acima de R$ 350</span></div>
                            <div class="flex items-center gap-2"><i data-lucide="zap" class="text-orange-500 w-4 h-4"></i> <span>Desconto de até <strong>${finance.pixDiscount}% no PIX</strong></span></div>
                            <div class="flex items-center gap-2"><i data-lucide="credit-card" class="text-orange-500 w-4 h-4"></i> <span>Parcelamento facilitado em até 10x sem juros</span></div>
                        </div>
                    </div>

                    <div class="bg-white border-b border-slate-200 px-6 py-2 flex items-center gap-2 overflow-x-auto shrink-0 shadow-sm text-xs font-bold text-slate-600">
                        <button onclick="changeCategory('all')" class="px-3 py-1.5 rounded transition-all shrink-0 ${clientCategory==='all'?'bg-orange-600 text-white':'bg-slate-100 hover:bg-slate-200'}">Todos os Departamentos</button>
                        ${categories.map(c => `<button onclick="changeCategory('${c}')" class="px-3 py-1.5 rounded transition-all shrink-0 ${clientCategory===c?'bg-orange-600 text-white':'bg-slate-100 hover:bg-slate-200'}">${c}</button>`).join('')}
                    </div>

                    <div class="max-w-6xl mx-auto w-full px-6 pt-6 shrink-0">
                        <div class="flex items-center gap-2 mb-3">
                            <span class="bg-rose-600 text-white text-[9px] font-black uppercase px-2 py-0.5 rounded-md animate-pulse">Ofertas Flash</span>
                            <h3 class="text-xs font-black uppercase text-slate-400 tracking-wider">Descontos do Dia</h3>
                        </div>
                        <div class="horizontal-carousel">
                            ${carouselProducts.map(p => {
                                const discountPct = Math.round((1 - p.price / p.oldPrice) * 100);
                                const pixFinalPrice = p.price * (1 - (finance.pixDiscount / 100));
                                return `
                                    <div onclick="navigateTo('detail', '${p.id}')" class="w-[210px] bg-white border border-slate-200 rounded-xl p-3 flex flex-col justify-between shadow-sm hover:shadow-md transition-all cursor-pointer relative">
                                        <div class="h-28 rounded-lg overflow-hidden relative bg-white border mb-2 flex items-center justify-center p-1">
                                            <img src="${p.image || 'https://placehold.co/400x250/f1f5f9/64748b?text=Sem+Foto'}" class="max-h-full max-w-full object-contain">
                                            <span class="absolute top-1.5 left-1.5 bg-rose-600 text-white text-[9px] font-black px-1.5 py-0.5 rounded shadow">-${discountPct}%</span>
                                        </div>
                                        <div class="space-y-1 flex-grow flex flex-col justify-between">
                                            <div>
                                                <h4 class="font-bold text-slate-800 text-xs line-clamp-2 leading-tight">${p.name}</h4>
                                                <span class="text-[10px] text-slate-400 line-through">R$ ${p.oldPrice.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</span>
                                            </div>
                                            <div class="pt-2 mt-1 border-t border-slate-100 text-[10px]">
                                                <div class="font-extrabold text-emerald-600 text-xs">R$ ${pixFinalPrice.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</div>
                                                <div class="text-slate-400 mt-0.5">À vista no PIX</div>
                                            </div>
                                        </div>
                                        <div class="text-center mt-3 bg-red-50 text-red-600 text-[9px] font-black rounded py-0.5 uppercase tracking-wider">Apenas ${p.stock} un. restantes</div>
                                    </div>
                                `;
                            }).join('')}
                        </div>
                    </div>

                    <div class="p-6 max-w-6xl mx-auto w-full flex-grow">
                        <h3 class="text-xs font-black uppercase text-slate-400 tracking-wider mb-4">Catálogo Geral</h3>
                        <div class="grid grid-cols-1 sm:grid-cols-4 gap-5">
                            ${filteredProducts.map(p => {
                                const pixPrice = p.price * (1 - (finance.pixDiscount / 100));
                                return `
                                    <div onclick="navigateTo('detail', '${p.id}')" class="bg-white border rounded-xl overflow-hidden flex flex-col justify-between p-3 shadow-sm hover:shadow-md transition-all cursor-pointer">
                                        <div class="h-28 bg-white rounded border mb-2 flex items-center justify-center p-1"><img src="${p.image || 'https://placehold.co/400x250/f1f5f9/64748b?text=Sem+Foto'}" class="max-h-full max-w-full object-contain"></div>
                                        <div>
                                            <h4 class="font-bold text-slate-800 text-xs line-clamp-2">${p.name}</h4>
                                            <div class="text-xs font-black text-slate-900 mt-2">R$ ${p.price.toLocaleString('pt-BR')}</div>
                                            <div class="text-[10px] text-emerald-600 font-bold">R$ ${pixPrice.toLocaleString('pt-BR', {minimumFractionDigits:2})} <span class="text-slate-400 font-normal">no PIX</span></div>
                                        </div>
                                    </div>
                                `;
                            }).join('')}
                        </div>
                    </div>
                `;
            }
            // --- VIEW: DETALHES (KABUM STYLE) ---
            else if (currentView === "detail") {
                const p = products.find(prod => prod.id === selectedProductId);
                const discountPct = Math.round((1 - p.price / p.oldPrice) * 100);
                const pixPrice = p.price * (1 - (finance.pixDiscount / 100));
                const specsList = p.specifications ? p.specifications.split('|') : [];

                html += `
                    <div class="bg-white border-b border-slate-200 px-6 py-2.5 text-[11px] text-slate-500 font-medium shrink-0">
                        <div class="max-w-6xl mx-auto">Você está em: Hardware &gt; ${p.category} &gt; Código ${p.id}</div>
                    </div>

                    <div class="p-6 max-w-6xl mx-auto w-full flex-grow flex flex-col lg:flex-row gap-6">
                        <div class="w-full lg:w-2/5 bg-white border border-slate-200 rounded-xl p-4 flex items-center justify-center shadow-sm h-64"><img src="${p.image || 'https://placehold.co/500x400/f1f5f9/64748b?text=Sem+Foto'}" class="max-h-full max-w-full object-contain"></div>
                        <div class="w-full lg:w-2/5 space-y-4">
                            <div>
                                <div class="flex text-amber-500 gap-0.5"><i data-lucide="star" class="w-3 h-3 fill-current"></i><i data-lucide="star" class="w-3 h-3 fill-current"></i><i data-lucide="star" class="w-3 h-3 fill-current"></i><i data-lucide="star" class="w-3 h-3 fill-current"></i><i data-lucide="star" class="w-3 h-3 fill-current"></i></div>
                                <h2 class="text-base font-extrabold text-slate-900 mt-1">${p.name}</h2>
                                <span class="text-[10px] text-slate-400">Vendido e entregue por: <strong class="text-blue-600">Vortex Co.</strong></span>
                            </div>
                            <div class="space-y-1 text-xs text-slate-700 border-t pt-3">
                                <h5 class="font-bold text-slate-400 text-[10px] uppercase">Destaques Técnicos</h5>
                                ${specsList.map(s => `<li>${s.trim()}</li>`).join('')}
                            </div>
                            <div class="border-t pt-3">
                                <div class="flex gap-2 max-w-xs">
                                    <input type="text" id="cep-input" placeholder="Consultar CEP" class="bg-white border rounded px-2 py-1 text-xs w-full">
                                    <button onclick="calculateLocalShipping()" class="bg-slate-900 text-white text-xs px-3 rounded font-bold">OK</button>
                                </div>
                                <div id="shipping-result-box"></div>
                            </div>
                        </div>
                        <div class="w-full lg:w-1/4 bg-white border rounded-xl p-4 shadow-sm h-fit space-y-4">
                            <div>
                                <span class="text-emerald-700 bg-emerald-50 text-[10px] font-bold px-2 py-0.5 rounded">● Disponível</span>
                                <div class="mt-2">
                                    <span class="text-[10px] text-slate-400 line-through">R$ ${p.oldPrice.toLocaleString('pt-BR')}</span>
                                    <div class="text-2xl font-black text-orange-600">R$ ${pixPrice.toLocaleString('pt-BR', {minimumFractionDigits:2})}</div>
                                    <span class="text-[10px] text-slate-500 font-bold">No PIX com <strong>${finance.pixDiscount}% OFF</strong></span>
                                </div>
                            </div>
                            <button onclick="addClientCart('${p.id}')" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2.5 rounded-xl text-xs uppercase shadow-md transition-all">Adicionar ao Carrinho</button>
                        </div>
                    </div>
                    <div class="max-w-6xl mx-auto w-full px-6 pb-6">
                        <div class="bg-white border rounded-xl p-5 text-xs text-slate-700 space-y-2 shadow-sm">
                            <h3 class="text-xs font-black uppercase text-slate-400 border-b pb-2">Descrição Completa</h3>
                            <p class="leading-relaxed font-medium">${p.description}</p>
                        </div>
                    </div>
                `;
            }
            // --- VIEW: CENTRAL DO CLIENTE ---
            else if (currentView === "account") {
                const acc = JSON.parse(localStorage.getItem("db_account"));
                const orders = JSON.parse(localStorage.getItem("db_orders") || "[]");
                html += `
                    <div class="p-6 max-w-4xl mx-auto w-full flex-grow my-6 flex gap-6 text-xs text-slate-700">
                        <div class="w-1/3 bg-white border rounded-xl p-2 flex flex-col gap-0.5 font-semibold text-slate-500 shrink-0 shadow-sm">
                            <button onclick="selectedAccountTab='info'; renderClientView();" class="w-full text-left p-2 rounded-lg ${selectedAccountTab==='info'?'bg-blue-50 text-blue-600':''}">Minhas Informações</button>
                            <button onclick="selectedAccountTab='orders'; renderClientView();" class="w-full text-left p-2 rounded-lg ${selectedAccountTab==='orders'?'bg-blue-50 text-blue-600':''}">Meus Pedidos</button>
                        </div>
                        <div class="flex-grow bg-white border rounded-xl p-5 shadow-sm">
                            ${selectedAccountTab==='info' ? `<h3>Dados Cadastrais</h3><p class="mt-2"><strong>Titular:</strong> ${acc.name}</p><p><strong>E-mail:</strong> ${acc.email}</p>` : `<h3>Meus Pedidos</h3><div class="space-y-2 mt-2">${orders.length===0?'<span class="text-slate-400">Nenhum pedido efetuado.</span>':orders.map(o => `<div class="p-2 border rounded bg-slate-50 flex justify-between font-code"><span>${o.id}</span><strong>R$ ${o.value.toFixed(2)}</strong></div>`).join('')}</div>`}
                        </div>
                    </div>
                `;
            }
            // --- VIEW: CHECKOUT ---
            else if (currentView === "checkout") {
                const subtotal = cart.reduce((acc, c) => acc + (c.price * c.qty), 0);
                const discount = activeCoupon ? (subtotal * (activeCoupon.pct / 100)) : 0;
                const totalBase = subtotal - discount;
                html += `
                    <div class="p-6 max-w-4xl mx-auto w-full flex-grow my-6 flex flex-col md:flex-row gap-6 text-xs text-slate-700">
                        <div class="md:w-3/5 bg-white border rounded-xl p-5 space-y-4 shadow-sm">
                            <h3 class="text-sm font-black text-slate-900">Método de Liquidação</h3>
                            <div class="grid grid-cols-1 gap-2">
                                <label class="border p-3 rounded-xl flex items-center justify-between bg-slate-50 cursor-pointer"><div class="flex items-center gap-2"><input type="radio" name="pay_method" value="PIX" checked onchange="renderClientView()"> <span>⚡ PIX Imediato</span></div> <strong class="text-emerald-600 font-code">R$ ${(totalBase * (1 - (finance.pixDiscount / 100))).toFixed(2)}</strong></label>
                                <label class="border p-3 rounded-xl flex items-center justify-between bg-slate-50 cursor-pointer"><div class="flex items-center gap-2"><input type="radio" name="pay_method" value="Cartão de Crédito" onchange="renderClientView()"> <span>💳 Cartão de Crédito</span></div> <strong class="text-slate-900 font-code">R$ ${totalBase.toFixed(2)}</strong></label>
                            </div>
                        </div>
                        <div class="md:w-2/5 bg-white border rounded-xl p-5 flex flex-col justify-between space-y-4 h-fit shadow-sm">
                            <div>
                                <h4 class="font-bold text-sm text-slate-900 mb-2">Totalização da Fatura</h4>
                                <div class="flex justify-between border-b pb-2 text-slate-500"><span>Subtotal:</span><strong class="text-slate-900">R$ ${subtotal.toLocaleString('pt-BR')}</strong></div>
                            </div>
                            <button onclick="executeFinalCheckout('${totalBase}')" class="w-full text-white font-bold py-3 rounded-xl shadow bg-blue-600 hover:bg-blue-700">Concluir Pedido</button>
                        </div>
                    </div>
                `;
            }

            html += `
                <footer id="client-footer" class="bg-[#001f3f] text-slate-400 text-[11px] p-8 border-t border-blue-900 mt-auto select-text shrink-0">
                    <div class="max-w-6xl mx-auto grid grid-cols-1 sm:grid-cols-3 gap-6 mb-4 text-left">
                        <div><h5 class="text-white font-bold mb-1">Vortex Gaming Co.</h5><p class="leading-relaxed">Sua distribuidora de alta performance. Atendimento focado no consumidor entusiasta de hardware.</p></div>
                        <div><h5 class="text-white font-bold mb-1">Central de Atendimento</h5><p>Dúvidas ou suporte? Envie um e-mail para suporte@vortexhardware.com.br</p></div>
                        <div><h5 class="text-white font-bold mb-1">Logística Nacional</h5><p>Expedição direta de Florianópolis, SC para todo o Brasil.</p></div>
                    </div>
                    <div class="text-center text-slate-500 font-medium border-t border-blue-950 pt-4 mt-4">&copy; 2026 Vortex Co. Todos os direitos reservados.</div>
                </footer>
                </div>
            `;
            
            clientApp.innerHTML = html;
            lucide.createIcons();
            if(simulateCepResult && document.getElementById("shipping-result-box")) document.getElementById("shipping-result-box").innerHTML = simulateCepResult;
        }

        // --- MÉTODOS DE CÁLCULO E LOGÍSTICA ---
        function calculateLocalShipping() {
            const layout = `<div class="bg-slate-50 border p-2 rounded text-[10px] font-code mt-2">Sedex: <strong>R$ 14,90</strong> (2 dias) | PAC: <strong>Gratuito</strong> (5 dias)</div>`;
            simulateCepResult = layout; document.getElementById("shipping-result-box").innerHTML = layout;
        }

        function toggleCartSlide(open) {
            const el = document.getElementById("client-cart-slide");
            if(open) { el.classList.remove("hidden"); setTimeout(() => el.classList.remove("-translate-x-full"), 10); updateCartUiData(); }
            else { el.classList.add("-translate-x-full"); setTimeout(() => el.classList.add("hidden"), 300); }
        }

        function addClientCart(id) {
            const products = JSON.parse(localStorage.getItem("db_prod"));
            let cart = JSON.parse(localStorage.getItem("db_cart") || "[]");
            const p = products.find(prod => prod.id === id);

            const idx = cart.findIndex(c => c.id === id);
            if(idx !== -1) { cart[idx].qty++; } else { cart.push({ id: p.id, name: p.name, price: p.price, image: p.image, qty: 1 }); }
            
            localStorage.setItem("db_cart", JSON.stringify(cart));
            renderClientView();
            toggleCartSlide(true);
        }

        function changeCartQty(id, change) {
            let cart = JSON.parse(localStorage.getItem("db_cart"));
            const idx = cart.findIndex(c => c.id === id);
            if(idx !== -1) {
                cart[idx].qty += change;
                if(cart[idx].qty <= 0) cart.splice(idx, 1);
                localStorage.setItem("db_cart", JSON.stringify(cart));
                updateCartUiData(); renderClientView();
            }
        }

        function updateCartUiData() {
            const cart = JSON.parse(localStorage.getItem("db_cart") || "[]");
            const wrapper = document.getElementById("cart-items-wrapper");
            const total = cart.reduce((acc, c) => acc + (c.price * c.qty), 0);
            document.getElementById("cart-total-value").innerText = `R$ ${total.toLocaleString('pt-BR', {minimumFractionDigits:2})}`;
            if(cart.length === 0) { wrapper.innerHTML = `<div class="text-center py-4 text-slate-400">Carrinho Vazio.</div>`; return; }
            wrapper.innerHTML = cart.map(c => `
                <div class="flex items-center justify-between border-b pb-2 text-xs">
                    <span class="truncate pr-2 font-medium text-slate-700">${c.name}</span>
                    <div class="flex items-center gap-1 shrink-0">
                        <button onclick="changeCartQty('${c.id}', -1)" class="w-4 h-4 bg-slate-100 border rounded font-bold">-</button>
                        <span class="font-bold px-1">${c.qty}</span>
                        <button onclick="changeCartQty('${c.id}', 1)" class="w-4 h-4 bg-slate-100 border rounded font-bold">+</button>
                    </div>
                </div>
            `).join('');
        }

        function executeFinalCheckout(baseValue) {
            const cart = JSON.parse(localStorage.getItem("db_cart"));
            let products = JSON.parse(localStorage.getItem("db_prod"));
            let orders = JSON.parse(localStorage.getItem("db_orders") || "[]");
            const finance = JSON.parse(localStorage.getItem("db_finance"));
            const method = document.querySelector('input[name="pay_method"]:checked').value;

            let finalValue = parseFloat(baseValue);
            if (method === "PIX") finalValue = finalValue * (1 - (finance.pixDiscount / 100));

            for(let c of cart) {
                const idx = products.findIndex(p => p.id === c.id);
                if(idx !== -1) products[idx].stock -= c.qty;
            }

            const id = "ORD_" + Math.floor(100000 + Math.random()*900000);
            orders.push({ id, value: finalValue, date: new Date().toLocaleDateString('pt-BR') });

            localStorage.setItem("db_prod", JSON.stringify(products));
            localStorage.setItem("db_orders", JSON.stringify(orders));
            localStorage.setItem("db_cart", JSON.stringify([]));

            alert(`🎉 Pedido ${id} Concluído via ${method}! Obrigado por comprar na Vortex.`);
            navigateTo('home');
        }

        // Event Listener reativo para escutar modificações no banco vindo de outras abas (Painel Admin)
        window.addEventListener('storage', () => {
            renderClientView();
        });

        window.onload = function() {
            verifyDatabase();
            renderClientView();
        }
    </script>
</body>
</html>
