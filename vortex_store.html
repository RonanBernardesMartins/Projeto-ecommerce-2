<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vortex Hardware | Loja Oficial do Consumidor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&family=Inter:wght@300;400;500;600;700;800;950&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* Variáveis de estilo herdadas reativamente */
        :root {
            --brand-primary: #0060b6;
            --brand-secondary: #002f5c;
        }
        body { font-family: 'Inter', sans-serif; }
        .font-code { font-family: 'Fira Code', monospace; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .smooth-scroll { scroll-behavior: smooth; }
        .premium-gradient { background: linear-gradient(135deg, #020617 0%, #0f172a 50%, #1e1b4b 100%); }
        .horizontal-carousel { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; gap: 1rem; padding-bottom: 0.75rem; }
        .horizontal-carousel > div { scroll-snap-align: start; flex: 0 0 auto; }

        /* Dropdown da Conta Hover Setup */
        .account-dropdown-trigger:hover .account-dropdown {
            opacity: 1;
            pointer-events: auto;
            transform: translateY(0);
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col smooth-scroll">

    <div id="client-app" class="flex-grow flex flex-col min-h-screen"></div>

    <div id="client-cart-slide" class="fixed inset-y-0 right-0 w-full max-w-sm bg-white shadow-2xl border-l border-slate-200 transform translate-x-full transition-transform duration-300 z-50 flex flex-col hidden text-slate-800">
        <div class="p-4 border-b border-slate-100 flex items-center justify-between bg-slate-50">
            <h3 class="font-bold text-sm text-slate-900 flex items-center gap-1.5"><i data-lucide="shopping-cart" class="w-4 h-4 text-orange-500"></i> Seu Carrinho</h3>
            <button onclick="toggleCartSlide(false)" class="p-1 hover:bg-slate-200 rounded text-slate-400 hover:text-slate-700"><i data-lucide="x" class="w-4 h-4"></i></button>
        </div>
        <div id="cart-items-wrapper" class="flex-grow overflow-y-auto p-4 space-y-3"></div>
        <div class="p-4 border-t border-slate-100 bg-slate-50 space-y-3">
            <div class="flex justify-between text-xs font-bold"><span>Subtotal:</span><span id="cart-total-value" class="text-orange-600 text-sm">R$ 0,00</span></div>
            <button onclick="navigateTo('checkout')" class="w-full bg-slate-900 hover:bg-slate-800 text-white font-bold py-2.5 rounded text-xs flex items-center justify-center gap-1.5 shadow-md">
                <i data-lucide="arrow-right" class="w-3.5 h-3.5"></i> Avançar para o Checkout
            </button>
        </div>
    </div>

    <script>
        let currentView = "home";
        let selectedProductId = null;
        let selectedAccountTab = "info";
        let clientSearch = "";
        let clientCategory = "all";
        let activeCoupon = null;
        let simulateCepResult = null;

        // --- ENGINE DE RENDERIZAÇÃO DA STOREFRONT ---
        function renderClientView() {
            const clientApp = document.getElementById("client-app");
            const brand = JSON.parse(localStorage.getItem("db_brand"));
            const products = JSON.parse(localStorage.getItem("db_prod"));
            const categories = JSON.parse(localStorage.getItem("db_cats") || "[]");
            const finance = JSON.parse(localStorage.getItem("db_finance"));
            const cart = JSON.parse(localStorage.getItem("db_cart") || "[]");
            const accData = JSON.parse(localStorage.getItem("db_account"));
            const cartCount = cart.reduce((acc, c) => acc + c.qty, 0);

            // Injetar variáveis de cores do CMS
            document.documentElement.style.setProperty('--brand-primary', brand.primaryColor);
            document.documentElement.style.setProperty('--brand-secondary', brand.headerBg);

            let html = `
                <nav class="border-b px-6 py-4 flex items-center justify-between sticky top-0 z-40 shadow-lg text-white shrink-0 select-none" style="background-color: ${brand.headerBg}">
                    <div onclick="navigateTo('home'); changeCategory('all');" class="flex items-center gap-2.5 cursor-pointer">
                        <div class="px-3 py-1 bg-orange-600 rounded text-white font-black text-xl italic tracking-tighter shadow-md" style="background-color: ${brand.primaryColor}">VORTEX</div>
                        <span class="hidden sm:inline font-black text-sm tracking-tight">${brand.storeName}</span>
                    </div>
                    
                    <div class="hidden md:flex items-center bg-white rounded-lg px-3 py-1.5 w-full max-w-sm mx-4">
                        <input id="search-input-store" oninput="handleSearch(this.value)" type="text" placeholder="Busque seu hardware..." value="${clientSearch}" class="bg-transparent text-slate-800 text-xs focus:outline-none w-full">
                        <i data-lucide="search" class="w-4 h-4 text-slate-400"></i>
                    </div>

                    <div class="flex items-center gap-6 text-xs font-bold text-slate-200">
                        <button onclick="navigateTo('home'); changeCategory('all');" class="hover:text-orange-400 transition-all">Departamentos</button>
                        
                        <div class="relative account-dropdown-trigger py-2 cursor-pointer group">
                            <span class="hover:text-orange-400 transition-all flex items-center gap-1.5">
                                <i data-lucide="user" class="w-4 h-4 text-orange-400" style="color: ${brand.primaryColor}"></i>
                                Olá, <span class="uppercase">${accData.name.split(' ')[0]}</span> <i data-lucide="chevron-down" class="w-3 h-3 transition-transform group-hover:rotate-180"></i>
                            </span>

                            <div class="account-dropdown absolute right-0 top-full mt-1 w-56 bg-white rounded-xl shadow-2xl border border-slate-200 opacity-0 pointer-events-none transition-all duration-200 transform translate-y-2 z-50 text-slate-700 font-medium overflow-hidden">
                                <div class="p-3 bg-slate-900 text-white text-[11px] font-black flex items-center gap-2 border-b border-slate-800">
                                    <div class="w-6 h-6 rounded-full bg-orange-500 flex items-center justify-center text-white"><i data-lucide="shield" class="w-3.5 h-3.5"></i></div>
                                    <span>Membro Premium Ninja</span>
                                </div>
                                <div class="p-1.5 space-y-0.5 text-xs">
                                    <button onclick="selectedAccountTab='info'; navigateTo('account')" class="w-full text-left px-3 py-2 hover:bg-slate-100 rounded-lg flex items-center gap-2"><i data-lucide="sliders-horizontal" class="w-3.5 h-3.5 text-slate-400"></i> Central Minha Conta</button>
                                    <button onclick="selectedAccountTab='orders'; navigateTo('account')" class="w-full text-left px-3 py-2 hover:bg-slate-100 rounded-lg flex items-center gap-2"><i data-lucide="shopping-bag" class="w-3.5 h-3.5 text-slate-400"></i> Meus pedidos</button>
                                    <button onclick="selectedAccountTab='info'; navigateTo('account')" class="w-full text-left px-3 py-2 hover:bg-slate-100 rounded-lg flex items-center gap-2"><i data-lucide="file-text" class="w-3.5 h-3.5 text-slate-400"></i> Meus dados</button>
                                    <button onclick="selectedAccountTab='privacy'; navigateTo('account')" class="w-full text-left px-3 py-2 hover:bg-slate-100 rounded-lg flex items-center gap-2"><i data-lucide="lock" class="w-3.5 h-3.5 text-slate-400"></i> Segurança & Privacidade</button>
                                    <button onclick="selectedAccountTab='payment'; navigateTo('account')" class="w-full text-left px-3 py-2 hover:bg-slate-100 rounded-lg flex items-center gap-2"><i data-lucide="credit-card" class="w-3.5 h-3.5 text-slate-400"></i> Carteira & Pagamentos</button>
                                    <div class="h-px bg-slate-100 my-1"></div>
                                    <button onclick="alert('Sessão local protegida.');" class="w-full text-left px-3 py-2 text-red-600 hover:bg-red-50 rounded-lg flex items-center gap-2 font-bold"><i data-lucide="log-out" class="w-3.5 h-3.5"></i> Sair da Conta</button>
                                </div>
                            </div>
                        </div>

                        <button onclick="document.getElementById('client-footer').scrollIntoView({behavior:'smooth'})" class="hover:text-orange-400 transition-all">Ajuda</button>
                    </div>

                    <button onclick="toggleCartSlide(true)" class="px-4 py-2 bg-black/20 border border-white/10 text-slate-200 hover:text-white rounded-xl font-bold text-xs flex items-center gap-2 transition-all shadow-inner">
                        <i data-lucide="shopping-cart" class="w-4 h-4 text-orange-500" style="color: ${brand.primaryColor}"></i> Carrinho
                        <span class="bg-orange-600 text-white text-[10px] font-bold px-1.5 py-0.5 rounded-full" style="background-color: ${brand.primaryColor}">${cartCount}</span>
                    </button>
                </nav>

                <div class="flex-grow flex flex-col justify-between w-full bg-slate-50 select-text">
            `;

            // --- VIEW: HOME (VITRINE) ---
            if (currentView === "home") {
                const filteredProducts = products.filter(p => {
                    const matchesSearch = p.name.toLowerCase().includes(clientSearch) || p.description.toLowerCase().includes(clientSearch);
                    const matchesCat = clientCategory === "all" || p.category === clientCategory;
                    return matchesSearch && matchesCat;
                });
                const carouselProducts = products.filter(p => p.flashDeal);

                html += `
                    <div class="bg-white border-b border-slate-200 py-2.5 px-6 shadow-sm shrink-0">
                        <div class="max-w-6xl mx-auto flex flex-wrap items-center justify-between gap-4 text-[11px] font-bold text-slate-500">
                            <div class="flex items-center gap-2"><i data-lucide="truck" class="text-orange-500 w-4 h-4" style="color: ${brand.primaryColor}"></i> <span>${brand.shippingText}</span></div>
                            <div class="flex items-center gap-2"><i data-lucide="zap" class="text-orange-500 w-4 h-4" style="color: ${brand.primaryColor}"></i> <span>À vista com até <strong>${finance.pixDiscount}% de desconto no PIX</strong></span></div>
                            <div class="flex items-center gap-2"><i data-lucide="credit-card" class="text-orange-500 w-4 h-4" style="color: ${brand.primaryColor}"></i> <span>Até 10x sem juros ou parcelamento configurável</span></div>
                        </div>
                    </div>

                    <div class="bg-white border-b border-slate-200 px-6 py-2 flex items-center gap-2 overflow-x-auto shrink-0 shadow-sm text-xs font-bold text-slate-600">
                        <button onclick="changeCategory('all')" class="px-3 py-1.5 rounded-lg transition-all shrink-0 ${clientCategory==='all'?'bg-orange-600 text-white':'bg-slate-100 hover:bg-slate-200'}" style="background-color: ${clientCategory==='all' ? brand.primaryColor : ''}">Todos Departamentos</button>
                        ${categories.map(c => `<button onclick="changeCategory('${c}')" class="px-3 py-1.5 rounded-lg transition-all shrink-0 ${clientCategory===c?'bg-orange-600 text-white':'bg-slate-100 hover:bg-slate-200'}" style="background-color: ${clientCategory===c ? brand.primaryColor : ''}">${c}</button>`).join('')}
                    </div>

                    <div class="premium-gradient text-white py-12 px-6 shadow-inner shrink-0 relative" style="background: ${brand.bannerImg ? `url(${brand.bannerImg})` : ''}; background-size: cover; background-position: center;">
                        ${brand.bannerImg ? '<div class="absolute inset-0 bg-black/50 z-0"></div>' : ''}
                        <div class="max-w-6xl mx-auto flex flex-col sm:flex-row items-center justify-between gap-6 relative z-10">
                            <div class="space-y-2 max-w-xl">
                                <span class="inline-flex items-center gap-1.5 px-3 py-0.5 rounded-full text-[10px] font-extrabold bg-orange-500/10 text-orange-400 border border-orange-500/20 uppercase tracking-widest" style="color: ${brand.primaryColor}; border-color: ${brand.primaryColor}1a">Mesa de Operações Ativa</span>
                                <h2 class="text-2xl sm:text-3xl font-black">${brand.bannerTitle}</h2>
                                <p class="text-xs text-slate-300">${brand.bannerSub}</p>
                            </div>
                            <div class="bg-slate-900/90 border border-slate-800 p-4 rounded-xl text-center shadow-xl">
                                <span class="text-[9px] uppercase tracking-widest text-slate-400 font-bold">Utilize o Cupom</span>
                                <div class="text-base font-black font-code text-white">${brand.couponCode}</div>
                            </div>
                        </div>
                    </div>

                    <div class="max-w-6xl mx-auto w-full px-6 pt-6 shrink-0">
                        <div class="flex items-center gap-2 mb-3">
                            <span class="bg-rose-600 text-white text-[9px] font-black uppercase px-2 py-0.5 rounded-md animate-pulse">Flash Deals</span>
                            <h3 class="text-xs font-black uppercase text-slate-400 tracking-wider">Ofertas do Dia</h3>
                        </div>
                        <div class="horizontal-carousel">
                            ${carouselProducts.map(p => {
                                const discountPct = Math.round((1 - p.price / p.oldPrice) * 100);
                                const pixFinalPrice = p.price * (1 - (finance.pixDiscount / 100));
                                return `
                                    <div onclick="navigateTo('detail', '${p.id}')" class="w-[210px] bg-white border border-slate-200 rounded-xl p-3 flex flex-col justify-between shadow-sm hover:shadow-md transition-all cursor-pointer relative group">
                                        <div class="h-28 rounded-lg overflow-hidden relative bg-white border mb-2 flex items-center justify-center p-1">
                                            <img src="${p.image || 'https://placehold.co/400x250/f1f5f9/64748b?text=Hardware'}" class="max-h-full max-w-full object-contain group-hover:scale-103 transition-transform">
                                            <span class="absolute top-1.5 left-1.5 bg-rose-600 text-white text-[9px] font-black px-1.5 py-0.5 rounded shadow">-${discountPct}%</span>
                                        </div>
                                        <div class="space-y-1 flex-grow flex flex-col justify-between">
                                            <h4 class="font-bold text-slate-800 text-xs line-clamp-2 h-8 leading-tight group-hover:text-blue-600 transition-colors">${p.name}</h4>
                                            <div class="pt-2 border-t text-[10px]">
                                                <div class="text-[10px] text-slate-400 line-through">R$ ${p.oldPrice.toLocaleString('pt-BR')}</div>
                                                <div class="font-extrabold text-emerald-600 text-xs">R$ ${pixFinalPrice.toLocaleString('pt-BR', {minimumFractionDigits: 2})} <span class="text-[9px] text-slate-400 font-normal">no PIX</span></div>
                                                <div class="text-slate-400 mt-0.5">Ou 10x de R$ ${calculateInstallment(p.price, 10, finance).installment.split(' ')[2]}</div>
                                            </div>
                                        </div>
                                    </div>
                                `;
                            }).join('')}
                        </div>
                    </div>

                    <div class="p-6 max-w-6xl mx-auto w-full flex-grow">
                        <h3 class="text-xs font-black uppercase text-slate-400 tracking-wider mb-4">Catálogo Geral da Distribuidora</h3>
                        <div class="grid grid-cols-1 sm:grid-cols-4 gap-4">
                            ${filteredProducts.map(p => {
                                const pixPrice = p.price * (1 - (finance.pixDiscount / 100));
                                return `
                                    <div onclick="navigateTo('detail', '${p.id}')" class="bg-white border rounded-xl overflow-hidden flex flex-col justify-between p-3 shadow-sm hover:shadow-md transition-all cursor-pointer">
                                        <div class="h-28 bg-white rounded border mb-2 flex items-center justify-center p-1"><img src="${p.image || 'https://placehold.co/400x250/f1f5f9/64748b?text=Sem+Foto'}" class="max-h-full max-w-full object-contain"></div>
                                        <div>
                                            <h4 class="font-bold text-slate-800 text-xs line-clamp-2 h-8">${p.name}</h4>
                                            <div class="text-xs font-black text-slate-900 mt-2">R$ ${p.price.toLocaleString('pt-BR')}</div>
                                            <div class="text-[10px] text-emerald-600 font-bold">R$ ${pixPrice.toLocaleString('pt-BR', {minimumFractionDigits:2})} <span class="text-slate-400 font-normal">no PIX</span></div>
                                        </div>
                                    </div>
                                `;
                            }).join('')}
                        </div>
                    </div>
                `;
            }
            // --- VIEW: DETALHES COMPLETO (KABUM STYLE) ---
            else if (currentView === "detail") {
                const p = products.find(prod => prod.id === selectedProductId);
                const pixPrice = p.price * (1 - (finance.pixDiscount / 100));
                const specsList = p.specifications ? p.specifications.split('|') : [];
                const installmentValue = p.price / 10;

                html += `
                    <div class="bg-white border-b border-slate-200 px-6 py-2.5 text-[11px] text-slate-500 font-medium shrink-0">
                        <div class="max-w-6xl mx-auto">Você está em: Hardware &gt; ${p.category} &gt; Código ${p.id}</div>
                    </div>

                    <div class="p-6 max-w-6xl mx-auto w-full flex-grow flex flex-col lg:flex-row gap-6">
                        <div class="w-full lg:w-2/5 bg-white border border-slate-200 rounded-xl p-4 flex items-center justify-center shadow-sm h-64"><img src="${p.image || 'https://placehold.co/500x400/f1f5f9/64748b?text=Sem+Foto'}" class="max-h-full max-w-full object-contain"></div>
                        <div class="w-full lg:w-2/5 space-y-4">
                            <div>
                                <div class="flex text-amber-500 gap-0.5"><i data-lucide="star" class="w-3 h-3 fill-current"></i><i data-lucide="star" class="w-3 h-3 fill-current"></i><i data-lucide="star" class="w-3 h-3 fill-current"></i><i data-lucide="star" class="w-3 h-3 fill-current"></i><i data-lucide="star" class="w-3 h-3 fill-current"></i></div>
                                <h2 class="text-base font-extrabold text-slate-900 mt-1">${p.name}</h2>
                                <span class="text-[10px] text-slate-400">Vendido e entregue por: <strong style="color: ${brand.primaryColor}">${brand.storeName}</strong></span>
                            </div>
                            <div class="space-y-1 text-xs text-slate-700 border-t pt-3">
                                <h5 class="font-bold text-slate-400 text-[10px] uppercase">Destaques Ficha Técnica</h5>
                                ${specsList.map(s => `<li>${s.trim()}</li>`).join('')}
                            </div>
                            <div class="border-t pt-3">
                                <div class="flex gap-2 max-w-xs">
                                    <input type="text" id="cep-input" placeholder="Consultar CEP" class="bg-white border rounded px-2 py-1 text-xs w-full">
                                    <button onclick="calculateLocalShipping()" class="bg-slate-900 text-white text-xs px-3 rounded font-bold">OK</button>
                                </div>
                                <div id="shipping-result-box"></div>
                            </div>
                        </div>
                        <div class="w-full lg:w-1/4 bg-white border rounded-xl p-4 shadow-sm h-fit space-y-4">
                            <div>
                                <span class="text-emerald-700 bg-emerald-50 text-[10px] font-bold px-2 py-0.5 rounded">● Disponível</span>
                                <div class="mt-2">
                                    <span class="text-[10px] text-slate-400 line-through">R$ ${p.oldPrice.toLocaleString('pt-BR')}</span>
                                    <div class="text-2xl font-black text-orange-600" style="color: ${brand.primaryColor}">R$ ${pixPrice.toLocaleString('pt-BR', {minimumFractionDigits:2})}</div>
                                    <span class="text-[10px] text-slate-500 font-bold">No PIX com <strong>${finance.pixDiscount}% OFF</strong></span>
                                </div>
                                <div class="text-[11px] text-slate-500 font-medium mt-3 pt-3 border-t">
                                    <div>A prazo: <strong>R$ ${p.price.toLocaleString('pt-BR')}</strong></div>
                                    <div>Em até 10x de <strong>R$ ${installmentValue.toLocaleString('pt-BR')}</strong> ${finance.hasInterest ? 'com juros' : 'sem juros'}</div>
                                </div>
                            </div>
                            <button onclick="addClientCart('${p.id}')" class="w-full text-white font-bold py-2.5 rounded-xl text-xs uppercase" style="background-color: ${brand.primaryColor}">Adicionar ao Carrinho</button>
                        </div>
                    </div>
                `;
            }
            // --- VIEW: CENTRAL DE CONTAS (SUB-ABAS ADAPTADAS) ---
            else if (currentView === "account") {
                html += `
                    <div class="p-6 max-w-4xl mx-auto w-full flex-grow my-6 flex gap-6 text-xs text-slate-700">
                        <div class="w-1/3 bg-white border rounded-xl p-2 flex flex-col gap-0.5 font-semibold text-slate-500 shrink-0 shadow-sm">
                            <button onclick="selectedAccountTab='info'; renderClientView();" class="w-full text-left p-2 rounded-lg ${selectedAccountTab==='info'?'bg-blue-50 text-blue-600':''}">Minhas Informações</button>
                            <button onclick="selectedAccountTab='orders'; renderClientView();" class="w-full text-left p-2 rounded-lg ${selectedAccountTab==='orders'?'bg-blue-50 text-blue-600':''}">Meus Pedidos</button>
                            <button onclick="selectedAccountTab='payment'; renderClientView();" class="w-full text-left p-2 rounded-lg ${selectedAccountTab==='payment'?'bg-blue-50 text-blue-600':''}">Dados de Pagamento</button>
                            <button onclick="selectedAccountTab='privacy'; renderClientView();" class="w-full text-left p-2 rounded-lg ${selectedAccountTab==='privacy'?'bg-blue-50 text-blue-600':''}">Segurança & Privacidade</button>
                        </div>
                        <div class="flex-grow bg-white border rounded-xl p-5 shadow-sm">
                            ${selectedAccountTab==='info' ? `<h3>Dados Cadastrais</h3><p class="mt-2"><strong>Titular:</strong> ${accData.name}</p><p><strong>E-mail:</strong> ${accData.email}</p><p><strong>Fone:</strong> ${accData.phone}</p>` :
                              selectedAccountTab==='orders' ? `<h3>Meus Pedidos</h3><div class="space-y-2 mt-2"><span class="text-slate-400 font-code">// Buscando no banco relacional local...</span></div>` :
                              selectedAccountTab==='payment' ? `<h3>Carteira de Pagamento</h3><p class="mt-1 font-code bg-slate-50 p-2 rounded border">${accData.paymentMethod}</p>` :
                              `<h3>Segurança</h3><p class="text-slate-500 mt-1">${accData.securityLog}</p>`}
                        </div>
                    </div>
                `;
            }
            // --- VIEW: CHECKOUT ---
            else if (currentView === "checkout") {
                const subtotal = cart.reduce((acc, c) => acc + (c.price * c.qty), 0);
                html += `
                    <div class="p-6 max-w-md mx-auto bg-white border rounded-xl my-6 text-xs text-center shadow-md space-y-4 text-slate-700">
                        <h3 class="font-bold text-sm">Checkout do Gateway</h3>
                        <p>Total a prazo: <strong>R$ ${subtotal.toLocaleString('pt-BR')}</strong></p>
                        <p class="text-emerald-600 font-bold">Total PIX (${finance.pixDiscount}% OFF): R$ ${(subtotal * (1 - (finance.pixDiscount/100))).toLocaleString('pt-BR')}</p>
                        <button onclick="executeFinalCheckout('${subtotal}')" class="w-full text-white font-bold py-2 rounded-lg shadow-md" style="background-color: ${brand.primaryColor}">Confirmar Transação</button>
                    </div>
                `;
            }

            html += `
                <footer id="client-footer" class="bg-[#001f3f] text-slate-400 text-[11px] p-8 border-t border-blue-950 mt-auto select-text shrink-0">
                    <div class="max-w-6xl mx-auto text-center text-slate-300 font-medium">
                        &copy; 2026 ${brand.storeName}. Operando em modo de Distribuição Reativa Independente.
                    </div>
                </footer>
                </div>
            `;
            clientApp.innerHTML = html;
            lucide.createIcons();
            if(simulateCepResult && document.getElementById("shipping-result-box")) document.getElementById("shipping-result-box").innerHTML = simulateCepResult;
        }

        function calculateLocalShipping() {
            const layout = `<div class="bg-slate-50 border p-2 rounded text-[10px] font-code mt-2">Sedex: <strong>R$ 14,90</strong> (2 dias) | PAC: <strong>Gratuito</strong> (5 dias)</div>`;
            simulateCepResult = layout; document.getElementById("shipping-result-box").innerHTML = layout;
        }

        function toggleCartSlide(open) {
            const el = document.getElementById("client-cart-slide");
            if(open) { el.classList.remove("hidden"); setTimeout(() => el.classList.remove("-translate-x-full"), 10); updateCartUiData(); }
            else { el.classList.add("-translate-x-full"); setTimeout(() => el.classList.add("hidden"), 300); }
        }

        function addClientCart(id) {
            const products = JSON.parse(localStorage.getItem("db_prod"));
            let cart = JSON.parse(localStorage.getItem("db_cart") || "[]");
            const p = products.find(prod => prod.id === id);
            const idx = cart.findIndex(c => c.id === id);
            if(idx !== -1) { cart[idx].qty++; } else { cart.push({ id: p.id, name: p.name, price: p.price, image: p.image, qty: 1 }); }
            localStorage.setItem("db_cart", JSON.stringify(cart));
            renderClientView(); toggleCartSlide(true);
        }

        function changeCartQty(id, change) {
            let cart = JSON.parse(localStorage.getItem("db_cart"));
            const idx = cart.findIndex(c => c.id === id);
            if(idx !== -1) {
                cart[idx].qty += change;
                if(cart[idx].qty <= 0) cart.splice(idx, 1);
                localStorage.setItem("db_cart", JSON.stringify(cart));
                updateCartUiData(); renderClientView();
            }
        }

        function updateCartUiData() {
            const cart = JSON.parse(localStorage.getItem("db_cart") || "[]");
            const wrapper = document.getElementById("cart-items-wrapper");
            const total = cart.reduce((acc, c) => acc + (c.price * c.qty), 0);
            document.getElementById("cart-total-value").innerText = `R$ ${total.toLocaleString('pt-BR', {minimumFractionDigits:2})}`;
            if(cart.length === 0) { wrapper.innerHTML = `<div class="text-center py-4 text-slate-400">Carrinho Vazio.</div>`; return; }
            wrapper.innerHTML = cart.map(c => `
                <div class="flex items-center justify-between border-b pb-2 text-xs">
                    <span class="truncate pr-2 font-medium text-slate-700">${c.name}</span>
                    <div class="flex items-center gap-1 shrink-0">
                        <button onclick="changeCartQty('${c.id}', -1)" class="w-4 h-4 bg-slate-100 border rounded font-bold">-</button>
                        <span class="font-bold px-1">${c.qty}</span>
                        <button onclick="changeCartQty('${c.id}', 1)" class="w-4 h-4 bg-slate-100 border rounded font-bold">+</button>
                    </div>
                </div>
            `).join('');
        }

        function executeFinalCheckout(baseValue) {
            let products = JSON.parse(localStorage.getItem("db_prod"));
            let orders = JSON.parse(localStorage.getItem("db_orders") || "[]");
            const id = "ORD_" + Math.floor(100000 + Math.random()*900000);
            orders.push({ id, value: parseFloat(baseValue), date: new Date().toLocaleDateString('pt-BR') });
            localStorage.setItem("db_orders", JSON.stringify(orders)); localStorage.setItem("db_cart", JSON.stringify([]));
            alert(`🎉 Pedido ${id} Processado!`);
            navigateTo('home');
        }

        function handleSearch(val) { clientSearch = val.toLowerCase(); currentView = "home"; renderClientView(); }
        function changeCategory(cat) { clientCategory = cat; currentView = "home"; renderClientView(); }

        // API Cruzada: Escuta modificações do Admin nas outras abas
        window.addEventListener('storage', () => {
            renderClientView();
        });

        window.onload = function() {
            if (!localStorage.getItem("db_prod")) localStorage.setItem("db_prod", JSON.stringify(KABUM_HARDWARE_DB));
            if (!localStorage.getItem("db_cats")) localStorage.setItem("db_cats", JSON.stringify(DEFAULT_CATEGORIES));
            if (!localStorage.getItem("db_brand")) localStorage.setItem("db_brand", JSON.stringify(DEFAULT_BRANDING));
            if (!localStorage.getItem("db_finance")) localStorage.setItem("db_finance", JSON.stringify(DEFAULT_FINANCE));
            if (!localStorage.getItem("db_cart")) localStorage.setItem("db_cart", JSON.stringify([]));
            if (!localStorage.getItem("db_orders")) localStorage.setItem("db_orders", JSON.stringify([]));
            if (!localStorage.getItem("db_account")) localStorage.setItem("db_account", JSON.stringify({ name: "Alex Silva Santos", email: "alex.santos@devflorianopolis.com.br", phone: "(48) 99123-4567", securityLog: "Conexão Criptografada Ativa", paymentMethod: "PIX Configurado" }));
            
            renderClientView();
        }
    </script>
</body>
